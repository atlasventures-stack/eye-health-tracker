<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Eye shape -->
  <ellipse cx="256" cy="256" rx="180" ry="120" fill="white" opacity="0.95"/>
  <!-- Iris -->
  <circle cx="256" cy="256" r="80" fill="#1a1a2e"/>
  <!-- Pupil -->
  <circle cx="256" cy="256" r="40" fill="#0f0f1a"/>
  <!-- Highlight -->
  <circle cx="280" cy="232" r="20" fill="white" opacity="0.8"/>
  <!-- Small highlight -->
  <circle cx="240" cy="270" r="8" fill="white" opacity="0.5"/>
</svg>
